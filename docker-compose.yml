services:
  money-ledger:
    build: .
    container_name: money-ledger
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      PORT: "5173"
      LEDGER_TOKEN: "${LEDGER_TOKEN:-}"
      BASE_PATH: "${BASE_PATH:-}"
      TZ: "${TZ:-Asia/Shanghai}"
      VAPID_PUBLIC_KEY: "${VAPID_PUBLIC_KEY:-}"
      VAPID_PRIVATE_KEY: "${VAPID_PRIVATE_KEY:-}"
      VAPID_SUBJECT: "${VAPID_SUBJECT:-mailto:admin@example.com}"
    volumes:
      - ./data:/app/data
