<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="月度预算">
    <title>月度预算</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Shared Budget</p>
          <h1>预算</h1>
        </div>
        <label class="month-picker">
          <span>月份</span>
          <input id="monthInput" type="month">
        </label>
      </header>

      <main>
        <section id="dashboardView" class="view is-active" aria-label="预算看板">
          <div class="feed-author">
            <div class="avatar-pair" aria-hidden="true">
              <span>我</span>
              <span>Ta</span>
            </div>
            <div class="author-meta">
              <strong>我们的本月预算</strong>
              <span>按分类控制开支</span>
            </div>
            <button id="copySummaryButton" class="follow-button" type="button">摘要</button>
          </div>

          <div class="summary-panel">
            <div class="summary-main">
              <span class="summary-label">本月已花</span>
              <strong id="totalSpent">0.00</strong>
              <span id="totalBudget">/ 0.00</span>
            </div>
            <div class="meter" aria-hidden="true"><span id="totalMeter"></span></div>
            <div class="metric-grid">
              <article>
                <span>剩余额度</span>
                <strong id="remainingAmount">0.00</strong>
              </article>
              <article>
                <span>日均可花</span>
                <strong id="dailyAmount">0.00</strong>
              </article>
              <article>
                <span>剩余天数</span>
                <strong id="remainingDays">0</strong>
              </article>
            </div>
          </div>

          <div class="section-heading">
            <h2>分类进度</h2>
          </div>
          <div id="categoryList" class="category-list"></div>
        </section>

        <section id="entryView" class="view" aria-label="快速记账">
          <form id="expenseForm" class="entry-panel">
            <label class="amount-field">
              <span>金额</span>
              <input id="amountInput" inputmode="decimal" autocomplete="off" placeholder="0.00" required>
            </label>

            <div class="field-group">
              <span class="field-label">分类</span>
              <div id="categoryChips" class="chip-grid"></div>
            </div>

            <div class="field-group">
              <span class="field-label">成员</span>
              <div id="memberChips" class="segmented"></div>
            </div>

            <div class="two-column">
              <label>
                <span>日期</span>
                <input id="dateInput" type="date" required>
              </label>
              <label>
                <span>备注</span>
                <input id="noteInput" maxlength="80" placeholder="可选">
              </label>
            </div>

            <button class="primary-button" type="submit">提交</button>
            <p id="entryFeedback" class="feedback" role="status"></p>
          </form>
        </section>

        <section id="detailsView" class="view" aria-label="记账明细">
          <div class="section-heading">
            <h2>记账明细</h2>
            <a id="exportLink" class="ghost-link" href="/api/export.csv" download="expenses.csv">导出 CSV</a>
          </div>
          <p class="details-intro">按日期倒序展示，每一天的合计会放在组标题右侧。</p>
          <div id="recentList" class="detail-list"></div>
        </section>

        <section id="statsView" class="view" aria-label="统计">
          <div class="stats-panel">
            <div class="section-heading">
              <h2>统计</h2>
              <span class="panel-hint">本月汇总</span>
            </div>
            <div class="stats-grid">
              <article>
                <span>平均日支出</span>
                <strong id="avgDailySpend">0.00</strong>
              </article>
              <article>
                <span>最高分类</span>
                <strong id="topCategoryName">-</strong>
                <small id="topCategoryAmount">0.00</small>
              </article>
              <article>
                <span>记录笔数</span>
                <strong id="recordCount">0</strong>
              </article>
              <article>
                <span>活跃天数</span>
                <strong id="activeDays">0</strong>
              </article>
            </div>

            <div class="section-heading">
              <h2>星期分布</h2>
            </div>
            <div id="weekdayList" class="bar-list"></div>

            <div class="section-heading">
              <h2>分类排行</h2>
            </div>
            <div id="rankList" class="rank-list"></div>
          </div>
        </section>

        <section id="settingsView" class="view" aria-label="预算设置">
          <form id="settingsForm" class="settings-panel">
            <div class="section-heading">
              <h2>成员</h2>
            </div>
            <div class="two-column">
              <label>
                <span>成员 1</span>
                <input id="memberOneInput" maxlength="12" required>
              </label>
              <label>
                <span>成员 2</span>
                <input id="memberTwoInput" maxlength="12" required>
              </label>
            </div>

            <div class="section-heading">
              <h2>分类额度</h2>
              <button id="addCategoryButton" class="ghost-button" type="button">新增分类</button>
            </div>
            <div id="budgetRows" class="budget-rows"></div>

            <button class="primary-button" type="submit">保存设置</button>
            <p id="settingsFeedback" class="feedback" role="status"></p>
          </form>
        </section>
      </main>

      <nav class="tabbar" aria-label="主导航">
        <button class="tab is-active" data-view="dashboard" type="button" aria-label="首页">
          <span class="tab-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4.5 10.5 12 4l7.5 6.5V20a1 1 0 0 1-1 1h-4.25v-5.5h-4.5V21H5.5a1 1 0 0 1-1-1z" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"/></svg>
          </span>
          <span class="tab-label">首页</span>
        </button>
        <button class="tab" data-view="details" type="button" aria-label="明细">
          <span class="tab-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.5 7h11M6.5 12h11M6.5 17h7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </span>
          <span class="tab-label">明细</span>
        </button>
        <button class="tab tab--primary" data-view="entry" type="button" aria-label="记账">
          <span class="tab-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg>
          </span>
        </button>
        <button class="tab" data-view="stats" type="button" aria-label="统计">
          <span class="tab-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 19V9m7 10V5m7 14v-7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </span>
          <span class="tab-label">统计</span>
        </button>
        <button class="tab" data-view="settings" type="button" aria-label="设置">
          <span class="tab-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 8.5A3.5 3.5 0 1 0 12 15.5 3.5 3.5 0 0 0 12 8.5Zm7.2 3.5c0-.5-.1-1-.2-1.5l2-1.5-2-3.5-2.4 1a8 8 0 0 0-2.6-1.5L13.7 2h-4l-.4 3a8 8 0 0 0-2.6 1.5l-2.4-1-2 3.5 2 1.5A8 8 0 0 0 4 12c0 .5.1 1 .2 1.5l-2 1.5 2 3.5 2.4-1A8 8 0 0 0 9.2 19l.4 3h4l.4-3a8 8 0 0 0 2.6-1.5l2.4 1 2-3.5-2-1.5c.1-.5.2-1 .2-1.5Z" fill="none" stroke="currentColor" stroke-width="1.55" stroke-linejoin="round"/></svg>
          </span>
          <span class="tab-label">设置</span>
        </button>
      </nav>
    </div>

    <script src="/app.js" defer></script>
  </body>
</html>
